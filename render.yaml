services:
  - type: web
    name: osf-project-checklist
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: OSF_CLIENT_ID
        sync: false
      - key: OSF_CLIENT_SECRET
        sync: false
      - key: OSF_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_HTTPS_ONLY
        value: "true"
